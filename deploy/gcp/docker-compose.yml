services:
  e2b-agents:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["serve"]
    environment:
      APP_ADDR: ":8082"
      DATABASE_URL: "${DATABASE_URL}"
      E2B_API_KEY: "${E2B_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SLACK_CLIENT_ID: "${SLACK_CLIENT_ID}"
      SLACK_CLIENT_SECRET: "${SLACK_CLIENT_SECRET}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_APP_TOKEN: "${SLACK_APP_TOKEN}"
      SLACK_REDIRECT_URL: "${SLACK_REDIRECT_URL}"
      SLACK_DEFAULT_TEAM_ID: "${SLACK_DEFAULT_TEAM_ID:-default}"
      SLACK_DEFAULT_TEMPLATE_ID: "${SLACK_DEFAULT_TEMPLATE_ID:-openclaw}"
      E2B_AGENTS_WORKSPACE_AUTO_CREATE: "${E2B_AGENTS_WORKSPACE_AUTO_CREATE:-true}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN}"
      E2B_AGENTS_ACP_ADAPTER_PORT: "${E2B_AGENTS_ACP_ADAPTER_PORT:-18790}"
      E2B_SANDBOX_TIMEOUT: "${E2B_SANDBOX_TIMEOUT:-1h}"
      SLACK_PROCESSING_TIMEOUT: "${SLACK_PROCESSING_TIMEOUT:-10m}"
    restart: unless-stopped

  e2b-agents-migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["migrate", "up"]
    environment:
      DATABASE_URL: "${DATABASE_URL}"
    profiles:
      - ops
